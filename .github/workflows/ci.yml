name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sincopos-api

jobs:
  # ── Backend: build + integration tests ──────────────────────────────────────
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrade
          POSTGRES_DB: pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SincoPos.sln

      - name: Build
        run: dotnet build SincoPos.sln --no-restore --configuration Release

      - name: Run integration tests
        run: >
          dotnet test tests/POS.IntegrationTests/POS.IntegrationTests.csproj
          --no-restore
          --configuration Release
          --logger "trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
        env:
          # Testcontainers levanta su propio PostgreSQL en Docker
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/**/coverage.cobertura.xml
          retention-days: 7

      - name: Install Swashbuckle CLI
        run: dotnet tool install --global Swashbuckle.AspNetCore.Cli

      - name: Generate OpenAPI contract
        run: |
          dotnet build POS.Api/POS.Api.csproj --configuration Release --no-restore -o /tmp/api-build
          swagger tofile --output openapi.json /tmp/api-build/POS.Api.dll v1
        continue-on-error: true

      - name: Upload OpenAPI contract
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-contract
          path: openapi.json
          retention-days: 30

  # ── Frontend: lint + build ───────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm run test:run

      - name: Build (production)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://sincopos-api.azurewebsites.net' }}
          VITE_ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_API_SCOPE: ${{ vars.VITE_ENTRA_API_SCOPE }}
          VITE_API_VERSION: ${{ vars.VITE_API_VERSION || 'v1' }}

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Docker: build + push a ghcr.io (solo en push a main) ────────────────────
  docker:
    name: Docker (build + push)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: POS.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy Backend: Azure App Service ────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Azure App Service)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SincoPos.sln

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Apply Database Migrations
        run: dotnet ef database update --project POS.Infrastructure/POS.Infrastructure.csproj --startup-project POS.Api/POS.Api.csproj
        env:
          ConnectionStrings__Postgres: ${{ secrets.DB_CONNECTION_STRING }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: sincopos-api
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Update App Service Settings
        run: az webapp config appsettings set --name sincopos-api --resource-group rg-sincopos-prod --settings ConnectionStrings__Postgres="${{ secrets.DB_CONNECTION_STRING }}"

  # ── Deploy Frontend: Azure Static Web Apps ──────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Azure Static Web Apps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true
